<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0d0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GeoQuest">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
  <title>GeoQuest</title>
  <style>

  /* ==============================================
     RESET + BASE
  ============================================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* App base */
    --bg:           #0f0d0b;
    --bg2:          #1a1714;
    --text:         #f0ede8;
    --muted:        rgba(240,237,232,0.5);
    --gold:         #c9a84c;
    --gold-glow:    rgba(201,168,76,0.3);

    /* World 1: Marauder's Atlas (Hogwarts) */
    --w1-parchment: #f2e4c4;
    --w1-parchment2:#e4d0a4;
    --w1-ink:       #2c1a10;
    --w1-gold:      #b8860b;
    --w1-wax:       #8b1a1a;

    /* World 2: Clan Territories (Warriors) */
    --w2-bg:        #0a1409;
    --w2-accent:    #4a7c59;
    --w2-text:      #d0eadb;

    /* World 3: Pale Frontier (Lightfall) */
    --w3-bg:        #070c18;
    --w3-accent:    #5a80b8;
    --w3-text:      #c8d8f0;

    /* World 4: Wakanda Underground */
    --w4-bg:        #0a0806;
    --w4-accent:    #c98a18;
    --w4-text:      #f0ddb0;

    --radius:  16px;
    --font:    'Nunito', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app { height: 100%; }

  /* ==============================================
     SCREENS
  ============================================== */
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: none;
  }
  .screen.active { display: flex; }

  /* ==============================================
     GRAND QUEST BAR
     Appears at the top of every screen
  ============================================== */
  .gq-bar {
    position: sticky;
    top: 0;
    z-index: 99;
    background: rgba(15,13,11,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(201,168,76,0.12);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .gq-label {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .gq-track {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }

  .gq-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a84c 0%, #e8c86a 100%);
    border-radius: 3px;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px var(--gold-glow);
    min-width: 2px;
  }

  .gq-count {
    font-size: 10px;
    font-weight: 800;
    color: var(--gold);
    flex-shrink: 0;
    min-width: 38px;
    text-align: right;
  }

  /* ==============================================
     HOME SCREEN
  ============================================== */
  .home-screen { background: var(--bg); }

  .home-header {
    padding: 20px 18px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .app-title h1 {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  .app-title p {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  /* Level pill */
  .level-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 40px;
    padding: 7px 12px 7px 9px;
    flex-shrink: 0;
    cursor: default;
  }
  .lp-icon { font-size: 17px; }
  .lp-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--gold);
    white-space: nowrap;
    line-height: 1.2;
  }
  .lp-xp {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    line-height: 1;
  }

  /* World cards grid */
  .world-grid {
    padding: 4px 14px 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 11px;
  }

  /* Base world card */
  .world-card {
    position: relative;
    min-height: 188px;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 14px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: transform 0.13s ease;
  }
  .world-card:active { transform: scale(0.965); }

  /* World 1 — parchment */
  .wc1 {
    background:
      radial-gradient(ellipse at 12% 8%,  rgba(220,188,100,0.35) 0%, transparent 48%),
      radial-gradient(ellipse at 88% 90%, rgba(160,90,40,0.2)   0%, transparent 45%),
      linear-gradient(155deg, #f5ecd2 0%, #e8d5a8 45%, #d9c48c 75%, #ccb076 100%);
    box-shadow:
      0 4px 28px rgba(184,134,11,0.22),
      inset 0 1px 0 rgba(255,255,255,0.45);
  }

  /* Ruled-line texture overlay on parchment */
  .wc1::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 26px,
      rgba(44,26,16,0.04) 26px, rgba(44,26,16,0.04) 27px
    );
    pointer-events: none;
    border-radius: var(--radius);
  }

  /* World 2 — forest */
  .wc2 {
    background:
      radial-gradient(ellipse at 80% 15%, rgba(74,124,89,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 15% 85%, rgba(50,90,55,0.25)  0%, transparent 45%),
      linear-gradient(155deg, #0c1a0d 0%, #101e10 55%, #0a1509 100%);
    border: 1px solid rgba(74,124,89,0.22);
    box-shadow: 0 4px 20px rgba(50,100,60,0.12);
  }

  /* World 3 — deep space */
  .wc3 {
    background:
      radial-gradient(ellipse at 55% 5%,  rgba(90,128,184,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 85%, rgba(50,70,130,0.2)  0%, transparent 40%),
      linear-gradient(155deg, #080d1c 0%, #090e1e 55%, #060b17 100%);
    border: 1px solid rgba(90,128,184,0.16);
    box-shadow: 0 4px 20px rgba(70,100,160,0.1);
  }

  /* World 4 — underground amber */
  .wc4 {
    background:
      radial-gradient(ellipse at 25% 75%, rgba(201,138,24,0.28) 0%, transparent 48%),
      radial-gradient(ellipse at 75% 20%, rgba(150,90,10,0.15)  0%, transparent 40%),
      linear-gradient(155deg, #110e08 0%, #0e0b06 55%, #090705 100%);
    border: 1px solid rgba(201,138,24,0.2);
    box-shadow: 0 4px 20px rgba(180,120,10,0.1);
  }

  /* Compass rose watermark (World 1 only) */
  .compass-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-44%, -58%);
    width: 96px;
    height: 96px;
    opacity: 0.1;
    pointer-events: none;
    color: var(--w1-ink);
  }

  /* World card content */
  .wc-emoji {
    position: absolute;
    top: 13px;
    right: 13px;
    font-size: 26px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    pointer-events: none;
  }

  .wc-dots {
    display: flex;
    gap: 5px;
    margin-bottom: 7px;
  }

  .wc-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    transition: background 0.3s;
  }

  /* Dot colours by world */
  .wc1 .wc-dot        { background: rgba(44,26,16,0.14); }
  .wc1 .wc-dot.done   { background: var(--w1-gold); box-shadow: 0 0 4px rgba(184,134,11,0.4); }
  .wc2 .wc-dot        { background: rgba(255,255,255,0.1); }
  .wc2 .wc-dot.done   { background: var(--w2-accent); box-shadow: 0 0 4px rgba(74,124,89,0.4); }
  .wc3 .wc-dot        { background: rgba(255,255,255,0.1); }
  .wc3 .wc-dot.done   { background: var(--w3-accent); box-shadow: 0 0 4px rgba(90,128,184,0.4); }
  .wc4 .wc-dot        { background: rgba(255,255,255,0.1); }
  .wc4 .wc-dot.done   { background: var(--w4-accent); box-shadow: 0 0 4px rgba(201,138,24,0.4); }

  .wc-term {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .wc1 .wc-term { color: rgba(44,26,16,0.55); }
  .wc2 .wc-term { color: rgba(208,234,219,0.5); }
  .wc3 .wc-term { color: rgba(200,216,240,0.5); }
  .wc4 .wc-term { color: rgba(240,221,176,0.5); }

  .wc-name {
    font-size: 14px;
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .wc1 .wc-name { color: var(--w1-ink); }
  .wc2 .wc-name { color: var(--w2-text); }
  .wc3 .wc-name { color: var(--w3-text); }
  .wc4 .wc-name { color: var(--w4-text); }

  .wc-enter {
    font-size: 11px;
    font-weight: 700;
    margin-top: 5px;
    opacity: 0.55;
  }
  .wc1 .wc-enter { color: var(--w1-ink); }
  .wc2 .wc-enter { color: var(--w2-text); }
  .wc3 .wc-enter { color: var(--w3-text); }
  .wc4 .wc-enter { color: var(--w4-text); }

  /* Home bottom strip */
  .home-bottom {
    padding: 14px 18px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .xp-readout {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .btn-fresh {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 30px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-fresh:active {
    border-color: rgba(255,90,90,0.35);
    color: rgba(255,110,110,0.8);
  }

  /* ==============================================
     WORLD SCREEN
  ============================================== */
  .world-screen { background: var(--bg); }

  /* Full-screen world themes */
  .world-screen.theme-w1 { background: linear-gradient(160deg, #f5ecd2 0%, #eddfc0 50%, #e2cfa8 100%); }
  .world-screen.theme-w2 { background: linear-gradient(160deg, #0a1409 0%, #0c1a0c 100%); }
  .world-screen.theme-w3 { background: linear-gradient(160deg, #060b17 0%, #080e1d 100%); }
  .world-screen.theme-w4 { background: linear-gradient(160deg, #0b0906 0%, #100c07 100%); }

  /* Grand Quest bar in World 1 theme — keep dark */
  .world-screen.theme-w1 .gq-bar {
    background: rgba(30,18,8,0.88);
    border-bottom: 1px solid rgba(184,134,11,0.2);
  }

  .world-header {
    padding: 14px 18px 18px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.55;
    transition: opacity 0.1s;
  }
  .back-btn:active { opacity: 1; }

  .theme-w1 .back-btn { color: var(--w1-ink); }
  .theme-w2 .back-btn { color: var(--w2-text); }
  .theme-w3 .back-btn { color: var(--w3-text); }
  .theme-w4 .back-btn { color: var(--w4-text); }

  .world-h-emoji {
    display: block;
    font-size: 42px;
    margin-bottom: 10px;
    line-height: 1;
  }

  .world-h-name {
    font-size: 27px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.025em;
  }
  .theme-w1 .world-h-name { color: var(--w1-ink); }
  .theme-w2 .world-h-name { color: var(--w2-text); }
  .theme-w3 .world-h-name { color: var(--w3-text); }
  .theme-w4 .world-h-name { color: var(--w4-text); }

  .world-h-sub {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.45;
  }
  .theme-w1 .world-h-sub { color: var(--w1-ink); }
  .theme-w2 .world-h-sub { color: var(--w2-text); }
  .theme-w3 .world-h-sub { color: var(--w3-text); }
  .theme-w4 .world-h-sub { color: var(--w4-text); }

  /* World progress bar */
  .world-prog {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px 18px;
  }

  .wp-label {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .theme-w1 .wp-label { color: rgba(44,26,16,0.55); }
  .theme-w2 .wp-label { color: rgba(74,124,89,0.8); }
  .theme-w3 .wp-label { color: rgba(90,128,184,0.8); }
  .theme-w4 .wp-label { color: rgba(201,138,24,0.8); }

  .wp-track {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    overflow: hidden;
  }
  .theme-w1 .wp-track { background: rgba(44,26,16,0.1); }
  .theme-w2 .wp-track { background: rgba(74,124,89,0.15); }
  .theme-w3 .wp-track { background: rgba(90,128,184,0.12); }
  .theme-w4 .wp-track { background: rgba(201,138,24,0.12); }

  .wp-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .theme-w1 .wp-fill { background: linear-gradient(90deg, var(--w1-gold), #d4a820); }
  .theme-w2 .wp-fill { background: linear-gradient(90deg, #4a7c59, #60a070); }
  .theme-w3 .wp-fill { background: linear-gradient(90deg, #5a80b8, #6a98d0); }
  .theme-w4 .wp-fill { background: linear-gradient(90deg, #c98a18, #e0a830); }

  .wp-pct {
    font-size: 11px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .theme-w1 .wp-pct { color: var(--w1-gold); }
  .theme-w2 .wp-pct { color: var(--w2-accent); }
  .theme-w3 .wp-pct { color: var(--w3-accent); }
  .theme-w4 .wp-pct { color: var(--w4-accent); }

  /* Unit list */
  .unit-list {
    padding: 0 14px 36px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .unit-row {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 15px 15px;
    border-radius: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease;
    position: relative;
    overflow: hidden;
  }
  .unit-row:active { transform: scale(0.98); }

  .theme-w1 .unit-row { background: rgba(255,255,255,0.36); border: 1px solid rgba(184,134,11,0.22); }
  .theme-w2 .unit-row { background: rgba(255,255,255,0.04); border: 1px solid rgba(74,124,89,0.2); }
  .theme-w3 .unit-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(90,128,184,0.16); }
  .theme-w4 .unit-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,138,24,0.15); }

  .unit-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .unit-num.done { font-size: 16px; }

  .theme-w1 .unit-num       { background: rgba(184,134,11,0.14); color: var(--w1-gold); }
  .theme-w1 .unit-num.done  { background: rgba(184,134,11,0.25); color: var(--w1-gold); }
  .theme-w2 .unit-num       { background: rgba(74,124,89,0.14);  color: var(--w2-accent); }
  .theme-w2 .unit-num.done  { background: rgba(74,124,89,0.28);  color: #6aaa7a; }
  .theme-w3 .unit-num       { background: rgba(90,128,184,0.12); color: var(--w3-accent); }
  .theme-w3 .unit-num.done  { background: rgba(90,128,184,0.25); color: #7aaae0; }
  .theme-w4 .unit-num       { background: rgba(201,138,24,0.12); color: var(--w4-accent); }
  .theme-w4 .unit-num.done  { background: rgba(201,138,24,0.25); color: #e0aa38; }

  .unit-meta { flex: 1; min-width: 0; }

  .unit-name {
    font-size: 14px;
    font-weight: 800;
    line-height: 1.3;
  }
  .theme-w1 .unit-name { color: var(--w1-ink); }
  .theme-w2 .unit-name { color: var(--w2-text); }
  .theme-w3 .unit-name { color: var(--w3-text); }
  .theme-w4 .unit-name { color: var(--w4-text); }

  .unit-sub {
    font-size: 11px;
    font-weight: 600;
    margin-top: 2px;
  }
  .theme-w1 .unit-sub { color: rgba(44,26,16,0.45); }
  .theme-w2 .unit-sub { color: rgba(208,234,219,0.4); }
  .theme-w3 .unit-sub { color: rgba(200,216,240,0.38); }
  .theme-w4 .unit-sub { color: rgba(240,221,176,0.4); }

  .unit-chevron { font-size: 16px; opacity: 0.3; flex-shrink: 0; }

  /* ==============================================
     UNIT SCREEN (Phase 3 stub)
  ============================================== */
  .unit-screen { background: var(--bg); }
  .unit-screen.theme-w1 { background: linear-gradient(160deg, #f5ecd2 0%, #e2cfa8 100%); }
  .unit-screen.theme-w2 { background: linear-gradient(160deg, #0a1409 0%, #0c1a0c 100%); }
  .unit-screen.theme-w3 { background: linear-gradient(160deg, #060b17 0%, #080e1d 100%); }
  .unit-screen.theme-w4 { background: linear-gradient(160deg, #0b0906 0%, #100c07 100%); }

  .unit-screen.theme-w1 .gq-bar {
    background: rgba(30,18,8,0.88);
    border-bottom: 1px solid rgba(184,134,11,0.2);
  }

  .unit-stub {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    text-align: center;
    gap: 10px;
  }

  .stub-emoji { font-size: 52px; line-height: 1; }

  .stub-title {
    font-size: 20px;
    font-weight: 900;
    line-height: 1.2;
    margin-top: 4px;
  }
  .unit-screen.theme-w1 .stub-title { color: var(--w1-ink); }
  .unit-screen.theme-w2 .stub-title { color: var(--w2-text); }
  .unit-screen.theme-w3 .stub-title { color: var(--w3-text); }
  .unit-screen.theme-w4 .stub-title { color: var(--v4-text); }

  .stub-sub {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.45;
    max-width: 220px;
    line-height: 1.5;
  }
  .unit-screen.theme-w1 .stub-sub { color: var(--w1-ink); }

  /* ==============================================
     MODAL: Start Fresh confirmation
  ============================================== */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 24px;
  }
  .modal-bg.open { display: flex; }

  .modal-box {
    background: #1e1b18;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 22px;
    padding: 28px 22px;
    max-width: 310px;
    width: 100%;
    text-align: center;
  }

  .modal-icon { font-size: 38px; margin-bottom: 12px; }
  .modal-h    { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .modal-p    { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 24px; }

  .modal-row  { display: flex; gap: 9px; }

  .modal-btn {
    flex: 1;
    padding: 13px;
    border-radius: 13px;
    font-family: var(--font);

    gap: 9px;

    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    text-align: left;
    border-radius: 12px;
    padding: 13px 16px;

    line-height: 1.4;

  .theme-w1 .quiz-opt.opt-correct {

    background: rgba(200,50,50,0.1);

    border-color: rgba(200,50,50,0.2);
  }
  .theme-w1 .quiz-opt.opt-disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-8px); }
    35%  { transform: translateX(7px); }
    55%  { transform: translateX(-5px); }
    75%  { transform: translateX(4px); }
    90%  { transform: translateX(-2px); }
    100% { transform: translateX(0); }

  .quiz-correct-banner {

    padding: 13px 16px;
    font-size: 13px;
    font-weight: 700;

  .done-surface {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 22px 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;

    flex-direction: column;
    align-items: center;

    box-shadow: 0 6px 28px rgba(44,26,16,0.18);

  .ds-seal  { font-size: 44px; line-height: 1; }
  .ds-title { font-size: 18px; font-weight: 900; line-height: 1.2; }

  .theme-w1 .ds-score { color: var(--w1-gold); }
  .theme-w1 .ds-sub   { color: var(--w1-ink); }

  </style>
</head>

  </div>

  <!-- ============================================
       MODAL: Start Fresh
  ============================================ -->
  <div id="modal" class="modal-bg">
    <div class="modal-box">
      <div class="modal-icon">🔄</div>
      <div class="modal-h">Start Fresh?</div>

var KEY = 'gq_v1';
var state = {};

function mkState() {
  var s = { xp: 0, units: {} };
  for (var wi = 0; wi < WORLDS.length; wi++) {
    var w = WORLDS[wi];
    for (var ui = 0; ui < w.units.length; ui++) {
      s.units[w.units[ui].id] = { done: false, hi: 0, perfect: false };
    }
  }
  return s;
}

function loadState() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var saved = JSON.parse(raw);
      var fresh = mkState();
      fresh.xp = saved.xp || 0;
      for (var k in saved.units) {
        if (fresh.units[k] !== undefined) {
          fresh.units[k] = saved.units[k];
        }
      }
      return fresh;
    }
  } catch(e) {}
  return mkState();
}

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

/* ============================================
   COMPUTED
============================================ */
function doneCount() {
  var n = 0;
  for (var k in state.units) { if (state.units[k].done) n++; }
  return n;
}

function worldDone(wkey) {
  var world = getWorld(wkey);
  if (!world) return 0;
  var n = 0;
  for (var ui = 0; ui < world.units.length; ui++) {
    if (state.units[world.units[ui].id] && state.units[world.units[ui].id].done) n++;
  }
  return n;
}

function curLevel() {
  var l = 0;
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (state.xp >= LEVELS[i].xp) { l = i; break; }
  }
  return l;
}

function getWorld(idOrKey) {
  for (var i = 0; i < WORLDS.length; i++) {
    if (WORLDS[i].id === idOrKey || WORLDS[i].key === idOrKey) return WORLDS[i];
  }
  return null;
}

function getUnit(uid) {
  for (var wi = 0; wi < WORLDS.length; wi++) {
    var w = WORLDS[wi];
    for (var ui = 0; ui < w.units.length; ui++) {
      if (w.units[ui].id === uid) return { world: w, unit: w.units[ui], idx: ui };
    }
  }
  return null;
}

function go(view, arg1, arg2) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');

  curView = view;

  if (view === 'home') {
    rHome();
    document.getElementById('s-home').classList.add('active');
  } else if (view === 'world') {
    curWid = arg1;
    rWorld(arg1);
    document.getElementById('s-world').classList.add('active');
  } else if (view === 'unit') {
    curWid = arg1;
    curUid = arg2;
    rUnit(arg1, arg2);
    document.getElementById('s-unit').classList.add('active');
  }
}

function goBack() {
  if (curView === 'unit') go('world', curWid);
  else go('home');
}

function rGQ() {
  var done = doneCount();
  var pct  = TOTAL > 0 ? Math.round((done / TOTAL) * 100) : 0;
  var ids  = ['gq0','gq1','gq2'];
  var cids = ['gqc0','gqc1','gqc2'];
  for (var i = 0; i < ids.length; i++) {
    var f = document.getElementById(ids[i]);
    var c = document.getElementById(cids[i]);
    if (f) f.style.width = pct + '%';
    if (c) c.textContent = done + ' / ' + TOTAL;
  }
}

    for (var ui = 0; ui < total; ui++) {
      var isDone = state.units[w.units[ui].id] && state.units[w.units[ui].id].done;
      dots += '<div class="wc-dot' + (isDone ? ' done' : '') + '"></div>';
    }

    html += '<div class="world-card wc' + w.id + '" onclick="go(\'world\',' + w.id + ')">'
      + (w.id === 1 ? rose() : '')
      + '<div class="wc-emoji">' + w.emoji + '</div>'
      + '<div class="wc-dots">' + dots + '</div>'
      + '<div class="wc-term">' + w.term + '</div>'
      + '<div class="wc-name">' + w.name + '</div>'
      + '<div class="wc-enter">' + done + '/' + total + ' units &rarr;</div>'
      + '</div>';
  }

  document.getElementById('world-grid').innerHTML = html;
}

/* ============================================
   RENDER: World
============================================ */
function rWorld(wid) {
  var w = getWorld(wid);
  if (!w) return;
  rGQ();

  var ws = document.getElementById('s-world');
  ws.className = 'screen world-screen theme-' + w.key;

  document.getElementById('wh-emoji').textContent = w.emoji;
  document.getElementById('wh-name').textContent  = w.name;
  document.getElementById('wh-sub').textContent   = w.term;

  var done  = worldDone(w.key);
  var total = w.units.length;
  var pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('wp-fill').style.width = pct + '%';
  document.getElementById('wp-pct').textContent  = pct + '%';

  var html = '';
  for (var ui = 0; ui < w.units.length; ui++) {
    var u      = w.units[ui];
    var us     = state.units[u.id];
    var isDone = us && us.done;
    var numTxt = isDone ? '✓' : (ui + 1);
    var subTxt = isDone
      ? 'Best score: ' + (us.hi || 0) + '%'
      : 'Ready to study';

    html += '<div class="unit-row" onclick="go(\'unit\',' + wid + ',\'' + u.id + '\')">'
      + '<div class="unit-num' + (isDone ? ' done' : '') + '">' + numTxt + '</div>'
      + '<div class="unit-meta">'
      +   '<div class="unit-name">' + u.name + '</div>'
      +   '<div class="unit-sub">' + subTxt + '</div>'
      + '</div>'
      + '<div class="unit-chevron">&#203A;</div>'
      + '</div>';
  }

  document.getElementById('unit-list').innerHTML = html;
}

/* ============================================
   RENDER: Unit — card engine
============================================ */
function rUnit(wid, uid) {
  var w   = getWorld(wid);
  var res = getUnit(uid);
  if (!w || !res) return;
  rGQ();

  var us = document.getElementById('s-unit');
  us.className = 'screen unit-screen theme-' + w.key;

  document.getElementById('unit-back').textContent = '\u2190 ' + w.name;

  var cards = CARDS[uid];

  if (!cards) {
    /* Stub for worlds 2-4 */
    document.getElementById('card-counter').textContent = '';
    document.getElementById('card-surface').className = 'card-surface';
    document.getElementById('card-surface').innerHTML =
      '<div class="card-stub">'
      + '<div class="card-stub-emoji">' + res.unit.emoji + '</div>'
      + '<div class="card-stub-title">' + res.unit.name + '</div>'
      + '<div class="card-stub-sub">Study cards coming soon</div>'
      + '</div>';
    document.getElementById('btn-prev').style.visibility = 'hidden';
    document.getElementById('btn-next').style.visibility = 'hidden';
    return;
  }

  /* World 1 — full card experience */
  quizMode = false;
  document.getElementById('btn-prev').style.visibility = 'visible';
  document.getElementById('btn-next').style.visibility = 'visible';

  /* If already done, show summary instead of cards */
  var us = state.units[uid];
  if (us && us.done) {
    document.getElementById('card-counter').textContent = 'Already completed';
    document.getElementById('btn-prev').style.visibility = 'hidden';
    var btnNext = document.getElementById('btn-next');
    btnNext.style.visibility = 'visible';
    btnNext.textContent = '\u2190 Back to World';
    btnNext.className   = 'card-btn card-btn-done';
    btnNext.disabled    = false;
    btnNext.onclick     = function() { go('world', curWid); };
    var vp = document.getElementById('card-viewport');
    vp.ontouchstart = null;
    vp.ontouchend   = null;
    vp.innerHTML = '<div class="done-surface">'
      + '<div class="ds-seal">🏅</div>'
      + '<div class="ds-title">' + res.unit.name + '</div>'
      + '<div class="ds-score">Best: ' + (us.hi || 0) + '%</div>'
      + '<div class="ds-sub">Unit complete. Use Start Fresh to reset and try again.</div>'
      + '</div>';
    return;
  }

  curCardIdx = 0;

  /* Touch / swipe events */
  var vp = document.getElementById('card-viewport');
  vp.ontouchstart = function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  };
  vp.ontouchend = function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) {
      if (dx < 0) nextCard();
      else prevCard();
    }
  };

  showCard(0, null);
}

function buildCardHTML(card) {
  if (card.type === 'gloss') {
    var h = '<div class="card-emoji">📖</div>'
      + '<div class="card-heading">Keyword Glossary</div>'
      + '<div class="gloss-hint">Tap a term to see its definition</div>'
      + '<div class="gloss-list">';
    for (var i = 0; i < card.terms.length; i++) {
      h += '<div class="gloss-item" id="gi-' + i + '" onclick="toggleGloss(' + i + ')">'
        +   '<div class="gloss-word">' + card.terms[i].w + '<span class="gloss-arrow">&#8250;</span></div>'
        +   '<div class="gloss-def" id="gd-' + i + '">' + card.terms[i].d + '</div>'
        + '</div>';
    }
    h += '</div>';
    return h;
  }
  return '<div class="card-emoji">' + card.emoji + '</div>'
    + '<div class="card-heading">' + card.head + '</div>'
    + '<div class="card-body">' + card.body + '</div>';
}

function showCard(idx, direction) {
  var cards = CARDS[curUid];
  if (!cards) return;
  var card  = cards[idx];
  var surface = document.getElementById('card-surface');
  var counter = document.getElementById('card-counter');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');

  counter.textContent = 'Card ' + (idx + 1) + ' of ' + cards.length;

  btnPrev.disabled = (idx === 0);

  if (idx === cards.length - 1) {
    var quiz = QUIZ[curUid];
    var us   = state.units[curUid];
    if (us && us.done) {
      btnNext.textContent = '\u2190 Back to World';
      btnNext.className = 'card-btn card-btn-done';
    } else if (quiz) {
      btnNext.textContent = 'Start Quiz \u2192';
      btnNext.className = 'card-btn card-btn-done';
    } else {
      btnNext.textContent = '\u2190 Back to World';
      btnNext.className = 'card-btn card-btn-done';
    }
  } else {
    btnNext.textContent = '\u2192';
    btnNext.className = 'card-btn card-btn-next';
    btnNext.disabled = false;
  }

  var doRender = function() {
    surface.className = 'card-surface' + (card.type === 'hook' ? ' card-hook' : '');
    surface.innerHTML = buildCardHTML(card);
    surface.scrollTop = 0;
  };

  if (!direction) {
    doRender();
    return;
  }

  /* Slide out */
  surface.style.transition = 'transform 0.12s ease, opacity 0.12s ease';
  surface.style.transform  = direction === 'next' ? 'translateX(-36px)' : 'translateX(36px)';
  surface.style.opacity    = '0';

  setTimeout(function() {
    doRender();
    surface.style.transition = 'none';
    surface.style.transform  = direction === 'next' ? 'translateX(36px)' : 'translateX(-36px)';
    surface.style.opacity    = '0';
    /* Force reflow so transition fires */
    surface.offsetHeight;
    surface.style.transition = 'transform 0.15s ease, opacity 0.15s ease';
    surface.style.transform  = 'translateX(0)';
    surface.style.opacity    = '1';
  }, 130);
}

function nextCard() {
  var cards = CARDS[curUid];
  if (!cards) return;
  if (curCardIdx >= cards.length - 1) {
    var quiz = QUIZ[curUid];
    var us   = state.units[curUid];
    if (quiz && !(us && us.done)) {
      startQuiz();
    } else {
      go('world', curWid);
    }
    return;
  }
  curCardIdx++;
  showCard(curCardIdx, 'next');
}

function prevCard() {
  if (curCardIdx <= 0) return;
  curCardIdx--;
  showCard(curCardIdx, 'prev');
}

function toggleGloss(i) {
  var def  = document.getElementById('gd-' + i);
  var item = document.getElementById('gi-' + i);
  if (!def) return;
  var isOpen = def.style.display === 'block';
  def.style.display = isOpen ? 'none' : 'block';
  if (item) {
    if (isOpen) item.classList.remove('open');
    else        item.classList.add('open');
  }
}

/* ============================================
   QUIZ ENGINE
============================================ */
function startQuiz() {
  quizMode     = true;
  curQIdx      = 0;
  quizScore    = 0;
  quizAnswered = false;
  /* Disable swipe during quiz */
  var vp = document.getElementById('card-viewport');
  vp.ontouchstart = null;
  vp.ontouchend   = null;
  showQuestion(0);
}

function showQuestion(idx) {
  var qs      = QUIZ[curUid];
  var q       = qs[idx];
  var vp      = document.getElementById('card-viewport');
  var counter = document.getElementById('card-counter');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');

  counter.textContent = 'Question ' + (idx + 1) + ' of ' + qs.length;
  btnPrev.style.visibility = 'hidden';
  btnNext.style.visibility = 'hidden';

  quizAnswered = false;

  var optsHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    optsHTML += '<button class="quiz-opt" onclick="handleAnswer(' + i + ')">' + q.opts[i] + '</button>';
  }

  var html = '<div class="quiz-surface" id="quiz-surface">'
    + '<div class="quiz-label">Question ' + (idx + 1) + ' / ' + qs.length + '</div>'
    + '<div class="quiz-q">' + q.q + '</div>'
    + '<div class="quiz-opts" id="quiz-opts">' + optsHTML + '</div>'
    + '<div class="quiz-correct-banner" id="quiz-banner"></div>'
    + '</div>';

  vp.innerHTML = html;
}

function handleAnswer(chosen) {
  if (quizAnswered) return;
  quizAnswered = true;

  var qs   = QUIZ[curUid];
  var q    = qs[curQIdx];
  var surf = document.getElementById('quiz-surface');
  var opts = document.querySelectorAll('.quiz-opt');
  var banner = document.getElementById('quiz-banner');

  /* Disable all options */
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.add('opt-disabled');
  }

  if (chosen === q.ans) {
    /* Correct */
    opts[chosen].classList.remove('opt-disabled');
    opts[chosen].classList.add('opt-correct');
    quizScore++;
    setTimeout(function() { advanceQuiz(); }, 900);
  } else {
    /* Wrong — shake, show correct */
    opts[chosen].classList.remove('opt-disabled');
    opts[chosen].classList.add('opt-wrong');
    opts[q.ans].classList.remove('opt-disabled');
    opts[q.ans].classList.add('opt-correct');

    if (surf) {
      surf.classList.add('shaking');
      surf.addEventListener('animationend', function() {
        surf.classList.remove('shaking');
      }, { once: true });
    }

    banner.innerHTML = '&#10003; The correct answer is: <strong>' + q.opts[q.ans] + '</strong>';
    banner.style.display = 'block';

    setTimeout(function() { advanceQuiz(); }, 2000);
  }
}

function advanceQuiz() {
  var qs = QUIZ[curUid];
  curQIdx++;
  if (curQIdx >= qs.length) {
    finishQuiz();
  } else {
    showQuestion(curQIdx);
  }
}

function finishQuiz() {
  quizMode = false;

  var qs      = QUIZ[curUid];
  var total   = qs.length;
  var pct     = Math.round((quizScore / total) * 100);
  var perfect = (quizScore === total);

  /* XP */
  var xpEarned = quizScore * 10;
  var firstTry = !(state.units[curUid] && state.units[curUid].done);
  if (perfect) xpEarned += 20;
  if (perfect && firstTry) xpEarned += 30;

  /* Save state */
  if (!state.units[curUid]) state.units[curUid] = { done: false, hi: 0, perfect: false };
  state.units[curUid].done    = true;
  state.units[curUid].perfect = perfect;
  state.units[curUid].hi      = Math.max(state.units[curUid].hi || 0, pct);
  state.xp += xpEarned;
  saveState();
  rGQ();

  /* Summary */
  var seal  = perfect ? '🏅' : (pct >= 70 ? '⭐' : '📜');
  var title = perfect ? 'Perfect score!' : (pct >= 70 ? 'Well done!' : 'Good effort!');
  var sub   = 'You earned ' + xpEarned + ' XP.';

  var rightItems = '';
  var qset = QUIZ[curUid];
  for (var i = 0; i < qset.length; i++) {
    rightItems += '<div>' + (i + 1) + '. ' + qset[i].q + '</div>'
      + '<div style="font-weight:700;margin-bottom:6px;">\u2192 ' + qset[i].opts[qset[i].ans] + '</div>';
  }

  var html = '<div class="quiz-surface" style="gap:0;">'
    + '<div class="quiz-summary">'
    + '<div class="qs-seal">' + seal + '</div>'
    + '<div class="qs-title">' + title + '</div>'
    + '<div class="qs-score">' + quizScore + ' / ' + total + '</div>'
    + '<div class="qs-sub">' + sub + '</div>'
    + '</div>'
    + '<div style="margin-top:18px;padding-bottom:4px;">'
    + '<div class="quiz-label" style="margin-bottom:10px;">All correct answers</div>'
    + '<div class="qs-right">' + rightItems + '</div>'
    + '</div>'
    + '</div>';

  document.getElementById('card-viewport').innerHTML = html;
  document.getElementById('card-counter').textContent = 'Quiz complete';

  var btnNext = document.getElementById('btn-next');
  btnNext.style.visibility = 'visible';
  btnNext.textContent = '\u2190 Back to World';
  btnNext.className   = 'card-btn card-btn-done';
  btnNext.disabled    = false;
  btnNext.onclick     = function() { go('world', curWid); };

  document.getElementById('btn-prev').style.visibility = 'hidden';
}

/* ============================================
   START FRESH
============================================ */
function askFresh() {
  document.getElementById('modal').classList.add('open');
}
function closeFresh() {
  document.getElementById('modal').classList.remove('open');
}
function doFresh() {
  closeFresh();
  state = mkState();
  saveState();
  go('home');
}

/* ============================================
   SERVICE WORKER REGISTRATION
============================================ */
function regSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
      .catch(function(e) { console.warn('SW not registered:', e); });
  }
}

/* ============================================
   INIT
============================================ */
state = loadState();
go('home');
regSW();

</script>
